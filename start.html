<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Guest Directory</h1>

        <form id="guestForm">

            <input type="text" id="name" placeholder="Guest Name" required>

            <input type="text" id="roomNumber" placeholder="Room Number" required>

            <input type="text" id="phoneNumber" placeholder="Phone Number" required>

            <button type="submit">Add Guest</button>

        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Room Number</th>
                    <th>Phone Number</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="guestTableBody">
                
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
