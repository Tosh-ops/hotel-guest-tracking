<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Guest Directory</h1>

        <form id="guestForm">

            <input type="text" id="name" placeholder="Guest Name" required>

            <input type="text" id="roomNumber" placeholder="Room Number" required>

            <input type="text" id="phoneNumber" placeholder="Phone Number" required>

            <button type="submit">Add Guest</button>

        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Room Number</th>
                    <th>Phone Number</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="guestTableBody">
                
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>
    <!-- AI Chatbot Widget -->
    <div id="chatbotBubble" onclick="toggleChatbot()">💬</div>

    <div id="chatbotBox">
        <div id="chatbotHeader">Hotel Assistant</div>
        <div id="chatbotMessages"></div>
        <div id="chatbotInputArea">
            <input type="text" id="chatbotInput" placeholder="Ask something...">
            <button onclick="sendChatbotMessage()">Send</button>
        </div>
    </div>

    <script>
        function toggleChatbot() {
            const box = document.getElementById("chatbotBox");
            box.style.display = box.style.display === "flex" ? "none" : "flex";
        }

        async function sendChatbotMessage() {
            const input = document.getElementById("chatbotInput");
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById("chatbotMessages");
            messagesDiv.innerHTML += `<div class="userMsg">${message}</div>`;
            input.value = "";

            try {
                const response = await fetch("http://127.0.0.1:8000/api/chatbot/chat/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                messagesDiv.innerHTML += `<div class="botMsg">${data.reply}</div>`;
            } catch (error) {
                messagesDiv.innerHTML += `<div class="botMsg">Sorry, something went wrong.</div>`;
            }

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>

</body>
</html>
